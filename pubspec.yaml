name: block_blast
description: A premium block blast puzzle game — Enchanted Forest Edition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Flame engine
  flame: ^1.18.0
  flame_riverpod: ^5.0.0
  flame_audio: ^2.1.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase - comment these out until flutterfire configure is done
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_analytics: ^11.1.0
  firebase_storage: ^12.1.0
  firebase_crashlytics: ^4.1.0

  # Auth
  google_sign_in: ^6.2.1

  # AdMob
  google_mobile_ads: ^5.1.0

  # IAP
  in_app_purchase: ^3.2.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Navigation
  go_router: ^14.1.0

  # Storage
  shared_preferences: ^2.2.3

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Utils
  connectivity_plus: ^6.0.3
  collection: ^1.18.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.jpg"
  adaptive_icon_background: "#0D1F0D"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
